<!doctype html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>FinanzasHogar</title>
<style>
body{font-family:system-ui,sans-serif;background:#f2f1ed;color:#1e1c18;margin:0} .app{max-width:980px;margin:auto;padding:12px 12px 96px}
.tabs{display:flex;gap:6px;overflow:auto}.tab,.btn{border:1px solid #ccc9c1;background:#fff;border-radius:10px;min-height:46px;padding:0 12px;font-weight:700}
.tab.on{background:#cfe3e4;border-color:#016870;color:#016870} .sec{display:none}.sec.on{display:block}
.card{background:#fff;border:1px solid #e0ddd7;border-radius:14px;padding:12px;margin-top:10px}
.k{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}.kv{font-size:28px;font-weight:800}
.list{display:flex;flex-direction:column;gap:8px}.it{border:1px solid #e0ddd7;border-radius:12px;padding:10px;background:#fff;display:flex;justify-content:space-between;gap:8px}
.m{font-size:13px;color:#78756e}.f{margin:0 0 8px}.i,.s{width:100%;min-height:48px;border:1px solid #ccc9c1;border-radius:10px;padding:10px;background:#eceae5}
.r{display:grid;grid-template-columns:1fr 1fr;gap:8px}.tbl{width:100%;border-collapse:collapse}.tbl td,.tbl th{border-bottom:1px solid #e0ddd7;padding:8px;text-align:left}
.fab{position:fixed;right:14px;bottom:14px;width:66px;height:66px;border:none;border-radius:999px;background:#016870;color:#fff;font-size:30px}
.ov{position:fixed;inset:0;background:#0008;display:none;align-items:flex-end}.ov.on{display:flex}.sh{background:#fff;width:100%;max-width:620px;margin:auto;border-radius:18px 18px 0 0;padding:12px}
@media(max-width:768px){.k{grid-template-columns:1fr 1fr}.r{grid-template-columns:1fr}}
@media(max-width:480px){body{font-size:16px}.k{grid-template-columns:1fr}.tab,.btn,.i,.s{min-height:50px}}
</style></head>
<body><div id="load" style="position:fixed;inset:0;background:#f2f1ed;display:flex;align-items:center;justify-content:center;z-index:30;font-weight:700">Cargando...</div><div id="toast" style="position:fixed;left:50%;bottom:88px;transform:translateX(-50%);background:#171512;color:#fff;padding:10px 14px;border-radius:999px;display:none;z-index:40;max-width:90%;text-align:center"></div><div class="app">
<div style="position:sticky;top:0;background:#f2f1ed;padding-bottom:8px;z-index:2"><div style="display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap"><h2 style="margin:0;color:#016870">FinanzasHogar</h2><div style="display:flex;gap:6px;flex-wrap:wrap"><button class="btn" id="rf">Actualizar</button><button class="btn" id="th">Tema</button></div></div>
<div class="tabs"><button class="tab on" data-v="ov">Resumen</button><button class="tab" data-v="ca">Tarjetas</button><button class="tab" data-v="st">Resumenes</button><button class="tab" data-v="in">Cuotas</button><button class="tab" data-v="re">Reintegros</button></div></div>
<section class="sec on" id="ov"><div class="card k" id="ovk"></div><div class="card"><h3>Movimientos</h3><div class="tabs"><button class="tab on" data-t="all">Todos</button><button class="tab" data-t="income">Ingresos</button><button class="tab" data-t="expense">Gastos</button></div><div class="list" id="tx"></div></div></section>
<section class="sec" id="ca"><div class="card"><h3>Tarjetas</h3><button class="btn" id="nca">Nueva tarjeta</button><div class="list" id="cards"></div></div></section>
<section class="sec" id="st"><div class="card"><h3>Subir PDF</h3><label class="f">Tarjeta<select class="s" id="pc"></select></label><label class="f">PDF<input class="i" id="pf" type="file" accept=".pdf,application/pdf"></label><button class="btn" id="pp">Preview</button></div><div class="card" id="pv" style="display:none"><div style="display:flex;justify-content:space-between;gap:8px;align-items:center"><h3 style="margin:0">Preview</h3><span class="badge" id="pdfBadge">preview</span></div><label class="f">Emisor<input class="i" id="pvi"></label><label class="f">Vencimiento<input class="i" id="pvd" type="date"></label><label class="f">Total<input class="i" id="pvt" type="number"></label><div class="m" id="pvw"></div><button class="btn" id="ps">Guardar</button></div><div class="card"><h3>Resumenes</h3><button class="btn" id="ms">Carga manual</button><div id="msw" style="display:none"><div class="r"><label class="f">Tarjeta<select class="s" id="msc"></select></label><label class="f">Emisor<input class="i" id="msi"></label><label class="f">Vencimiento<input class="i" id="msd" type="date"></label><label class="f">Total<input class="i" id="mst" type="number"></label><label class="f">Pago minimo<input class="i" id="msMin" type="number"></label><label class="f">Archivo<input class="i" id="msFile"></label></div><button class="btn" id="mscbtn">Crear manual</button></div><div class="list" id="sts"></div></div></section>
<section class="sec" id="in"><div class="card k" id="ink"></div><div class="card"><h3>Cuotas</h3><div class="r"><label class="f">Tarjeta<select class="s" id="ic"></select></label><label class="f">Tipo<select class="s" id="io"><option value="">Todos</option><option>personal</option><option>business</option><option>mixed</option></select></label><label class="f">Estado<select class="s" id="is"><option value="">Todos</option><option>pending</option><option>partial</option><option>paid</option></select></label></div><button class="btn" id="mi">Carga manual</button><div id="miw" style="display:none"><div class="r"><label class="f">Tarjeta<select class="s" id="mic"></select></label><label class="f">Comercio<input class="i" id="mim"></label><label class="f">Monto<input class="i" id="mia" type="number"></label><label class="f">Vence<input class="i" id="mid" type="date"></label></div><button class="btn" id="mib">Crear manual</button></div><div class="list" id="ins"></div></div></section>
<section class="sec" id="re"><div class="card k" id="rek"></div><div class="card"><h3>Reintegros</h3><button class="btn" id="mr">Carga manual</button><div id="mrw" style="display:none"><div class="r"><label class="f">Tarjeta<select class="s" id="mrc"></select></label><label class="f">Concepto<input class="i" id="mrn"></label><label class="f">Total<input class="i" id="mrt" type="number"></label><label class="f">Negocio<input class="i" id="mrb" type="number"></label></div><button class="btn" id="mrbt">Crear manual</button></div><div style="overflow:auto"><table class="tbl"><thead><tr><th>Fecha</th><th>Concepto</th><th>Tarjeta</th><th>Total</th><th>Negocio</th><th>Estado</th><th>Accion</th></tr></thead><tbody id="ret"></tbody></table></div></div></section>
</div><button class="fab" id="nt">+</button><div class="ov" id="ovm"><div class="sh"><div style="display:flex;justify-content:space-between"><b id="sht">Editar</b><button class="btn" id="sc">Cerrar</button></div><div id="shb"></div></div></div>
<script>
const S={v:"ov",t:"all",tx:[],cards:[],st:[],in:[],re:[],fc:null,u:null,e:null};
const $=id=>document.getElementById(id);
const warn=(msg)=>console.warn("[frontend]",msg);
const withEl=(id,fn)=>{const el=$(id);if(!el){warn(`Missing element #${id}`);return null}try{return fn(el)}catch(error){console.warn(`[frontend] error on #${id}`,error);return null}};
const setDisplay=(id,value)=>withEl(id,el=>{el.style.display=value;});
const setText=(id,value)=>withEl(id,el=>{el.textContent=value;});
const setHtml=(id,value)=>withEl(id,el=>{el.innerHTML=value;});
const toggleClass=(id,className,enabled)=>withEl(id,el=>{el.classList.toggle(className,enabled);});
const setValue=(id,value)=>withEl(id,el=>{el.value=value;});
const on=(id,eventName,handler)=>withEl(id,el=>{el.addEventListener(eventName,handler);});
const n=v=>{v=Number(v);return Number.isFinite(v)?v:0},f=v=>new Intl.NumberFormat("es-AR",{maximumFractionDigits:2}).format(n(v)),esc=v=>String(v??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c])),api=async(u,o={})=>{const r=await fetch(u,{method:o.m||"GET",headers:o.f?{}:{"Content-Type":"application/json"},body:o.b});const p=await r.json().catch(()=>({}));if(!r.ok||p.ok===false)throw Error(p.error||"Error API");return p};
document.addEventListener("DOMContentLoaded",()=>{try{bind();setValue("msd",new Date().toISOString().slice(0,10));setValue("mid",new Date().toISOString().slice(0,10));load().catch(error=>console.warn("[frontend] load failed",error));}catch(error){console.warn("[frontend] init failed",error);toast("La interfaz cargo con errores parciales.");}});
function bind(){try{document.querySelectorAll("[data-v]").forEach(b=>b.onclick=()=>{try{S.v=b.dataset.v;document.querySelectorAll("[data-v]").forEach(x=>x.classList.toggle("on",x===b));document.querySelectorAll(".sec").forEach(x=>x.classList.toggle("on",x.id===S.v));}catch(error){console.warn("[frontend] tab switch failed",error)}});document.querySelectorAll("[data-t]").forEach(b=>b.onclick=()=>{try{S.t=b.dataset.t;document.querySelectorAll("[data-t]").forEach(x=>x.classList.toggle("on",x===b));rTx();}catch(error){console.warn("[frontend] tx filter failed",error)}});on("rf","click",()=>load());on("th","click",()=>{document.documentElement.dataset.theme=document.documentElement.dataset.theme==="dark"?"light":"dark"});on("ms","click",()=>toggleBlock("msw"));on("mi","click",()=>toggleBlock("miw"));on("mr","click",()=>toggleBlock("mrw"));on("pp","click",pp);on("ps","click",ps);on("mscbtn","click",msc);on("mib","click",mib);on("mrbt","click",mrb);on("nca","click",()=>csh());on("nt","click",()=>tsh());on("sc","click",()=>toggleClass("ovm","on",false));withEl("ovm",el=>{el.onclick=e=>{if(e.target===e.currentTarget)toggleClass("ovm","on",false);};});["ic","io","is"].forEach(id=>on(id,"change",()=>li().catch(error=>console.warn("[frontend] installment filter failed",error))));}catch(error){console.warn("[frontend] bind failed",error)}}
function toggleBlock(id){const el=$(id);if(!el){warn(`Missing block #${id}`);return;}el.style.display=el.style.display==="block"?"none":"block";}
async function load(){setDisplay("load","flex");try{await Promise.all([lt(),lc(),ls(),li(),lr()]);render();}catch(e){console.warn("[frontend] load error",e);alert(e.message);}finally{setDisplay("load","none");}}
async function lt(){S.tx=await api("/api/transactions")} async function lc(){S.cards=await api("/api/cards");["pc","msc","mic","mrc","ic"].forEach(id=>{const s=$(id),c=s.value;s.innerHTML=(id==="pc"||id==="ic"?"<option value=''>Todas</option>":"")+S.cards.map(x=>`<option value="${esc(x.cardId)}">${esc(x.issuer||"Tarjeta")} - ${esc(x.last4||"----")}</option>`).join("");if(c)s.value=c;})}
async function ls(){S.st=await api("/api/card-statements")} async function li(){const q=new URLSearchParams();if($("ic").value)q.set("cardId",$("ic").value);if($("io").value)q.set("ownerType",$("io").value);if($("is").value)q.set("reimbursementStatus",$("is").value);const s=q.toString()?("?"+q.toString()):"";S.in=await api("/api/installments"+s);S.fc=await api("/api/installments/forecast"+s)} async function lr(){S.re=await api("/api/reimbursements")}
function safeRun(name,fn){try{fn();}catch(error){console.warn(`[frontend] ${name} failed`,error);}}
function render(){safeRun("overview",rOv);safeRun("cards",rCards);safeRun("statements",rSt);safeRun("installments",rIn);safeRun("reimbursements",rRe);}
function rOv(){const inc=S.tx.filter(x=>x.type==="income").reduce((a,x)=>a+n(x.amount),0),exp=S.tx.filter(x=>x.type==="expense").reduce((a,x)=>a+n(x.amount),0),bal=inc-exp;setHtml("ovk",`<div class="kpi"><div>Balance</div><div class="kv">${bal<0?"-":""}$${f(Math.abs(bal))}</div></div><div class="kpi"><div>Ingresos</div><div class="kv">$${f(inc)}</div></div><div class="kpi"><div>Gastos</div><div class="kv">$${f(exp)}</div></div>`);rTx();}
function rTx(){let d=S.tx.filter(x=>S.t==="all"||x.type===S.t);setHtml("tx",d.length?d.map(t=>`<div class="it"><div><div class="name">${esc(t.description||t.category||"Movimiento")}</div><div class="m">${esc(t.category||"-")} · ${esc(t.date||"-")} · ${esc(t.type||"-")}</div></div><div><div class="amt">${t.type==="income"?"+":"-"}$${f(t.amount)}</div><div class="m"><button class="btn" onclick="tsh('${esc(t.id)}')">Editar</button><button class="btn" onclick="td('${esc(t.id)}')">Borrar</button></div></div></div>`).join(""):`<div class="m">Sin movimientos</div>`);}
function rCards(){setHtml("cards",S.cards.length?S.cards.map(c=>`<div class="it"><div><div class="name">${esc(c.issuer||"Tarjeta")} ${esc(c.last4||"----")}</div><div class="m">${esc(c.bank||"-")} · ${esc(c.brand||"-")} · Cierre ${esc(String(c.closeDay||"-"))} · Vence ${esc(String(c.dueDay||"-"))}</div></div><div class="m"><button class="btn" onclick="csh('${esc(c.cardId)}')">Editar</button><button class="btn" onclick="cd('${esc(c.cardId)}')">Borrar</button></div></div>`).join(""):`<div class="m">Sin tarjetas</div>`);}
function rSt(){setHtml("sts",S.st.length?S.st.map(s=>{let w=[];try{w=JSON.parse(s.warnings||"[]")}catch(_){if(s.warnings)w=[s.warnings]}const b=s.parseStatus==="parsed-with-warnings"?"b-warn":(s.parseStatus==="manual"?"b-pending":"b-paid");return `<div class="it"><div><div class="name">${esc(s.issuer||"Sin emisor")} - ${esc(s.fileName||"manual")}</div><div class="m">Vence ${esc(s.dueDate||"-")} · Total $${f(s.totalAmount)} · Minimo $${f(s.minimumPayment)}</div>${w.length?`<div class="m">Warnings: ${esc(w.join(" | "))}</div>`:""}</div><div><span class="badge ${b}">${esc(s.parseStatus||"manual")}</span></div></div>`}).join(""):`<div class="m">Sin resumenes</div>`);}
function rIn(){const x=S.fc||{thisMonth:{totalAmount:0},nextMonth:{totalAmount:0},thirdMonth:{totalAmount:0},totalPending:0};setHtml("ink",`<div class="kpi"><div>Pagas este mes</div><div class="kv">$${f(x.thisMonth.totalAmount)}</div></div><div class="kpi"><div>Pagas proximo</div><div class="kv">$${f(x.nextMonth.totalAmount)}</div></div><div class="kpi"><div>Total pendiente</div><div class="kv">$${f(x.totalPending)}</div></div>`);setHtml("ins",S.in.length?S.in.map(i=>`<div class="it"><div><div class="name">${esc(i.merchant||"Cuota")}</div><div class="m">${esc(i.dueDate||"-")} · ${esc(i.ownerType||"personal")} · ${esc(i.reimbursementStatus||"pending")} · Negocio ${f(i.businessPercent)}%</div></div><div><div class="amt">$${f(i.amount)}</div><button class="btn" onclick="ie('${esc(i.installmentId)}')">Editar</button></div></div>`).join(""):`<div class="m">Sin cuotas</div>`);}
function rRe(){const cm=new Date().toISOString().slice(0,7),m=S.re.filter(r=>String(r.reimbursementDueDate||"").slice(0,7)===cm&&r.reimbursementStatus!=="paid"),u=S.re.filter(r=>String(r.reimbursementDueDate||"").slice(0,7)>cm&&r.reimbursementStatus!=="paid"),p=S.re.filter(r=>r.reimbursementStatus==="paid");setHtml("rek",`<div class="kpi"><div>Negocio debe este mes</div><div class="kv">$${f(m.reduce((a,r)=>a+n(r.businessAmount),0))}</div></div><div class="kpi"><div>Proximos reintegros</div><div class="kv">$${f(u.reduce((a,r)=>a+n(r.businessAmount),0))}</div></div><div class="kpi"><div>Reintegrado</div><div class="kv">$${f(p.reduce((a,r)=>a+n(r.reimbursedAmount),0))}</div></div>`);setHtml("ret",S.re.length?S.re.map(r=>`<tr><td>${esc(r.reimbursementDueDate||"-")}</td><td>${esc(r.concept||"-")}</td><td>${esc((S.cards.find(c=>c.cardId===r.cardId)||{}).issuer||"-")}</td><td>$${f(r.totalPaid)}</td><td>$${f(r.businessAmount)}</td><td><span class="badge b-${esc(r.reimbursementStatus||"pending")}">${esc(r.reimbursementStatus||"pending")}</span></td><td><button class="btn" onclick="rp('${esc(r.reimbursementId)}')">Registrar</button></td></tr>`).join(""):`<tr><td colspan="7" class="m">Sin reintegros</td></tr>`);}
async function pp(){const fileInput=$("pf");if(!fileInput||!fileInput.files||!fileInput.files[0])return alert("Selecciona un PDF.");const f0=fileInput.files[0];const fd=new FormData();fd.set("file",f0);if(v("pc"))fd.set("cardId",v("pc"));fd.set("previewOnly","true");const r=await api("/api/card-statements/upload",{m:"POST",b:fd,f:true});S.u={f:f0,c:v("pc"),p:r.preview};setDisplay("pv","block");withEl("pdfBadge",el=>{el.className="badge "+((r.preview.warnings||[]).length?"b-warn":"b-paid");el.textContent=(r.preview.warnings||[]).length?"warning":"ok";});setValue("pvi",r.preview.issuer||"");setValue("pvd",r.preview.dueDate||"");setValue("pvt",n(r.preview.totalAmount));setText("pvw",(r.preview.warnings||[]).join(" | ")||"Sin warnings");}
async function ps(){if(!S.u)return alert("Primero preview.");const fd=new FormData();fd.set("file",S.u.f);if(S.u.c)fd.set("cardId",S.u.c);fd.set("previewOnly","false");const r=await api("/api/card-statements/upload",{m:"POST",b:fd,f:true});setDisplay("pv","none");setValue("pf","");S.u=null;await Promise.all([ls(),li(),lr()]);rSt();rIn();rRe();to((r.preview.warnings||[]).length?"Guardado con warnings.":"Resumen guardado.");}
async function msc(){const p={cardId:v("msc"),issuer:v("msi"),dueDate:v("msd"),totalAmount:n(v("mst")),minimumPayment:n(v("msMin")),fileName:v("msFile")||"manual",sourceType:"manual",parseStatus:"manual"};if(!p.cardId||!p.dueDate)return alert("Tarjeta y vencimiento obligatorios.");await api("/api/card-statements/manual",{m:"POST",b:JSON.stringify(p)});await ls();rSt();to("Resumen manual creado.");}
async function mib(){const p={cardId:v("mic"),merchant:v("mim"),amount:n(v("mia")),dueDate:v("mid"),ownerType:"personal"};if(!p.cardId||!p.merchant||p.amount<=0||!p.dueDate)return alert("Completa campos obligatorios.");await api("/api/installments/manual",{m:"POST",b:JSON.stringify(p)});await Promise.all([li(),lr()]);rIn();rRe();to("Cuota manual creada.");}
async function mrb(){const p={sourceType:"manual",sourceId:"manual-"+Date.now(),cardId:v("mrc"),concept:v("mrn"),totalPaid:n(v("mrt")),businessAmount:n(v("mrb")),reimbursementStatus:"pending"};if(!p.cardId||!p.concept||p.totalPaid<=0||p.businessAmount<=0)return alert("Completa campos obligatorios.");await api("/api/reimbursements",{m:"POST",b:JSON.stringify(p)});await lr();rRe();to("Reintegro manual creado.");}
function tsh(id){const t=id?S.tx.find(x=>x.id===id):null;S.e={k:"tx",id:id||null};sh(t?"Editar movimiento":"Nuevo movimiento",`<label class="f"><span class="l">Tipo</span><select class="s" id="tt"><option value="income">Ingreso</option><option value="expense">Gasto</option></select></label><label class="f"><span class="l">Monto</span><input class="i" id="ta" type="number"></label><div class="r"><label class="f"><span class="l">Categoria</span><input class="i" id="tc"></label><label class="f"><span class="l">Fecha</span><input class="i" id="td" type="date"></label></div><label class="f"><span class="l">Descripcion</span><input class="i" id="txd"></label><button class="btn" id="ts">Guardar</button>`);$("tt").value=t?t.type:"expense";$("ta").value=t?n(t.amount):"";$("tc").value=t?String(t.category||""):"";$("td").value=t?String(t.date||""):new Date().toISOString().slice(0,10);$("txd").value=t?String(t.description||""):"";$("ts").onclick=ts;}
async function ts(){const p={type:v("tt"),amount:n(v("ta")),category:v("tc"),date:v("td"),description:v("txd"),dueDate:""};if(p.amount<=0||!p.date)return alert("Monto y fecha obligatorios.");if(S.e.id){p.id=S.e.id;await api("/api/transactions",{m:"PATCH",b:JSON.stringify(p)});}else await api("/api/transactions",{m:"POST",b:JSON.stringify(p)});toggleClass("ovm","on",false);await lt();rOv();to("Movimiento guardado.");}
async function td(id){if(!confirm("Eliminar movimiento?"))return;await api("/api/transactions/"+encodeURIComponent(id),{m:"DELETE"});await lt();rOv();to("Movimiento eliminado.");}
function csh(id){const c=id?S.cards.find(x=>x.cardId===id):null;S.e={k:"card",id:id||null};sh(c?"Editar tarjeta":"Nueva tarjeta",`<div class="r"><label class="f"><span class="l">Emisor</span><input class="i" id="ci"></label><label class="f"><span class="l">Marca</span><input class="i" id="cb"></label><label class="f"><span class="l">Banco</span><input class="i" id="ck"></label><label class="f"><span class="l">Titular</span><input class="i" id="ch"></label><label class="f"><span class="l">Ultimos 4</span><input class="i" id="c4"></label><label class="f"><span class="l">Activo</span><select class="s" id="ca"><option value="true">Si</option><option value="false">No</option></select></label><label class="f"><span class="l">Cierre</span><input class="i" id="cc" type="number"></label><label class="f"><span class="l">Vence</span><input class="i" id="cd" type="number"></label></div><button class="btn" id="cs">Guardar</button>`);$("ci").value=c?c.issuer||"":"";$("cb").value=c?c.brand||"":"";$("ck").value=c?c.bank||"":"";$("ch").value=c?c.holder||"":"";$("c4").value=c?c.last4||"":"";$("ca").value=c&&c.active===false?"false":"true";$("cc").value=c?c.closeDay||1:1;$("cd").value=c?c.dueDay||1:1;$("cs").onclick=cs;}
async function cs(){const p={issuer:v("ci"),brand:v("cb"),bank:v("ck"),holder:v("ch"),last4:v("c4"),active:v("ca")==="true",closeDay:n(v("cc"))||1,dueDay:n(v("cd"))||1};if(!p.issuer||!p.holder)return alert("Emisor y titular obligatorios.");if(S.e.id)await api("/api/cards/"+encodeURIComponent(S.e.id),{m:"PATCH",b:JSON.stringify(p)});else await api("/api/cards",{m:"POST",b:JSON.stringify(p)});toggleClass("ovm","on",false);await lc();rCards();to("Tarjeta guardada.");}
async function cd(id){if(!confirm("Eliminar tarjeta?"))return;await api("/api/cards/"+encodeURIComponent(id),{m:"DELETE"});await lc();rCards();to("Tarjeta eliminada.");}
function ie(id){const i=S.in.find(x=>x.installmentId===id);if(!i)return;S.e={k:"inst",id};sh("Editar cuota",`<label class="f"><span class="l">Owner type</span><select class="s" id="io1"><option>personal</option><option>business</option><option>mixed</option></select></label><label class="f"><span class="l">Business percent</span><input class="i" id="ip" type="number"></label><label class="f"><span class="l">Estado reintegro</span><select class="s" id="ir"><option>pending</option><option>partial</option><option>paid</option></select></label><button class="btn" id="isv">Guardar</button>`);$("io1").value=i.ownerType||"personal";$("ip").value=n(i.businessPercent);$("ir").value=i.reimbursementStatus||"pending";$("isv").onclick=isv;}
async function isv(){await api("/api/installments/"+encodeURIComponent(S.e.id),{m:"PATCH",b:JSON.stringify({ownerType:v("io1"),businessPercent:n(v("ip")),reimbursementStatus:v("ir")})});toggleClass("ovm","on",false);await Promise.all([li(),lr()]);rIn();rRe();to("Cuota actualizada.");}
function rp(id){S.e={k:"re",id};sh("Registrar reintegro",`<label class="f"><span class="l">Monto recibido</span><input class="i" id="ra" type="number"></label><label class="f"><span class="l">Fecha</span><input class="i" id="rd" type="date"></label><button class="btn" id="rs">Registrar</button>`);$("rd").value=new Date().toISOString().slice(0,10);$("rs").onclick=rs;}
async function rs(){const p={reimbursementId:S.e.id,paymentAmount:n(v("ra")),reimbursedDate:v("rd")};if(p.paymentAmount<=0)return alert("Monto invalido.");await api("/api/reimbursements/register-payment",{m:"POST",b:JSON.stringify(p)});toggleClass("ovm","on",false);await lr();rRe();to("Pago registrado.");}
function sh(t,b){setText("sht",t);setHtml("shb",b);toggleClass("ovm","on",true);}
function to(m){setText("toast",m);setDisplay("toast","block");setTimeout(()=>setDisplay("toast","none"),2400);}
</script></body></html>
